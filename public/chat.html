<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat PrimeStack-Sol</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light">

  <!-- Header -->
  <header class="chat-header navbar navbar-expand-lg navbar-dark px-3 " style="background-color: #005461;">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <i class="fas fa-comment-dots"></i> Digital Chat
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#chatSidebar" aria-controls="chatSidebar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <a href="index.html" class="btn btn-light btn-sm ms-auto">Leave Chat</a>
  </header>

  <!-- Main content -->
  <div class="d-flex ">
    <!-- Sidebar -->
    <div class="collapse d-lg-block" id="chatSidebar">
      <div class="chat-sidebar p-3 border-end bg-light">
        <h6 class="text-secondary"><i class="fas fa-comments"></i> Chat Name:</h6>
        <h2 id="room-name" class="text-info">--</h2>
        <h6 class="text-secondary mt-3"><i class="fas fa-users"></i> Users Online</h6>
        <ul id="users" class="list-unstyled custom-scrollbar overflow-auto" style="max-height:70vh;"></ul>
      </div>
    </div>

    <!-- Chat messages + input -->
    <div class="flex-grow-1 d-flex flex-column justify-content-end position-relative">

      <!-- Chat messages -->
     <div class="chat-messages flex-grow-1 p-3 overflow-auto" style="background: #f0f0f0;"></div>
 
      <!-- Input -->
        <form id="chat-form">
      <div  class="chat-form-container p-2 border-top bg-light  position-sticky bottom-0">
          <input id="msg" type="text" class="form-control w-100 rounded-pill" placeholder="Type a message..." required autocomplete="off" />
          <button class="btn btn-success rounded-pill px-4" type="submit">
            <i class="fas fa-paper-plane"></i>
          </button>
      </div>
        </form>

    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.10.1/qs.min.js"></script>
  <script src="js/script.js" ></script>

  <!-- CSS -->
  <style>
    body, html { height: 100%; margin: 0; font-family: 'Roboto', sans-serif; }
    .chat-messages { flex-grow:1; display:flex; flex-direction:column; overflow-y:auto; }
    .chat-messages .message { display:inline-block; background:#5dc4d7; padding:10px 14px; border-radius:7px; max-width:70%; margin-bottom:10px; font-size:14px; line-height:18px; word-wrap:break-word; }
    .chat-messages .message.self { align-self:flex-end; border-bottom-right-radius:0; }
    .chat-messages .message.other { align-self:flex-start; border-bottom-left-radius:0; }
    .chat-form-container { display:flex; gap:10px; padding:10px; }
    .chat-form-container input { flex:1; padding:10px 15px; border-radius:25px; border:1px solid #069ba6; }
    .chat-form-container button { flex-shrink:0; }
    
    .chat-sidebar { height: calc(98vh - 56px); overflow-y:auto; }

    @media(max-width:991px){ .chat-sidebar{ position:absolute; z-index:1050; top:56px; left:0; width:250px; } }
  </style>

</body>
</html>
