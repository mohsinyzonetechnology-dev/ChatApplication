<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta http-equiv="X-UA-Compatible" content="ie=edge" />
       <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
      <link
         rel="shortcut icon"
         href="img/icons8-chat-64.png"
         type="image/x-icon"
      />
      <link
         rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css"
         integrity="sha256-mmgLkCYLUQbXn0B1SRqzHar6dCnv9oZFPEC1g1cwlkk="
         crossorigin="anonymous"
      />
      <link rel="stylesheet" href="css/style.css" />
      <title>Chat PrimeStack-Sol</title>
   </head>
<style>
    
</style>

   <body>
      <div class="join-container ">
         <header class="join-header">
            <h3 style="color: #f5f6f7">
               <i class="fas fa-comment-dots"></i> Chat PrimeStack-Sol
            </h3>
         </header>
         <main class="join-main">
            <form action="chat.html">
               <div class="form-control">
                  <label for="username">Username</label>
                  <input
                     type="text"
                     name="username"
                     id="username"
                     placeholder="Enter username..."
                     required
                  />
               </div>
               <div class="form-control">
                  <label  for="room">Select Chat</label>
                  <select name="room" id="room">
                     <option value="Chat-1">Chat-1</option>
                     <option value="Chat-2">Chat-2</option>
                     <option value="Chat-3">Chat-3</option>
                     <option value="Chat-4">Chat-4</option>
                     <option value="Chat-5">Chat-5</option>
                  </select>
               </div>
               <button type="submit" class="btn">Join Chat</button>
            </form>
         </main>
         <footer style="margin-top: 25px" id="footer">
            <div style="text-align: center " class="credit">
               &copy; Chat PrimeStack-Sol
            </div>
         </footer>
      </div>
   </body>
</html>
